<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Shine on Stage - Ticket Booking Portal</title>  

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=400;500;600;700&display=swap" rel="stylesheet">  

    <style>  
        :root {  
            --bg: #09090C;  
            --surface: #111217;  
            --surface-2: #16171D;  
            --border: #1E2029;  
            --border-2: #262730;  

            --accent: #F0A500;  
            --red: #E05555;  
            --green: #3ECF8E;  
            --muted: #555555;  

            --text: #FFFFFF;  
            --text-2: #E0E0E0;  
            --text-3: #888888;  

            --font: 'Poppins', sans-serif;  
            --radius: 16px;  
        }  

        * {  
            margin: 0;  
            padding: 0;  
            box-sizing: border-box;  
            -webkit-tap-highlight-color: transparent;  
        }  

        body {  
            background: var(--bg);  
            color: var(--text);  
            font-family: var(--font);  
            min-height: 100vh;  
            display: flex;  
            flex-direction: column;  
            overflow-x: hidden;  
        }  

        /* ==========================================  
           ⏳ LOADING SCREEN WITH GLOW EFFECTS  
           ========================================== */  
        #loadingScreen {  
            position: fixed;  
            inset: 0;  
            background: #000;  
            z-index: 9999;  
            display: flex;  
            align-items: center;  
            justify-content: center;  
            flex-direction: column;  
            transition: opacity 0.2s ease;  
        }  
        #loadingScreen.fade-out {  
            opacity: 0;  
            pointer-events: none;  
        }  
        #loadingScreen.hidden {  
            display: none;  
        }  
        .ls-logo-area {  
            position: relative;  
            display: inline-block;  
            margin-bottom: 16px;  
        }  
        .ls-logo-area::before {  
            content: "";  
            position: absolute;  
            top: 50%; left: 50%;  
            width: 140px; height: 140px;  
            background: #F0A500;  
            border-radius: 50%;  
            transform: translate(-50%, -50%);  
            filter: blur(45px);  
            animation: glowPulse 3s infinite ease-in-out;  
        }  
        .ls-logo-area img {  
            width: 140px; height: 140px;  
            position: relative;  
            z-index: 1;  
            object-fit: contain;  
        }  
        .ls-title {  
            font-size: 1.1rem;  
            font-weight: 900;  
            letter-spacing: 5px;  
            color: #F0A500;  
            text-transform: uppercase;  
            margin: 8px 0 24px;  
        }  
        .ls-hype {  
            font-size: 0.75rem;  
            letter-spacing: 2px;  
            color: #F0A500;  
            text-transform: uppercase;  
            font-weight: 700;  
            height: 1.2rem;  
            margin-bottom: 10px;  
            text-align: center;  
        }  
        .ls-pct {  
            font-size: 2.8rem;  
            font-weight: 900;  
            color: #fff;  
            font-variant-numeric: tabular-nums;  
            margin-bottom: 10px;  
        }  
        .ls-bar-bg {  
            width: 220px; height: 3px;  
            background: #1a1a1a;  
            border-radius: 10px;  
            overflow: hidden;  
        }  
        .ls-bar-fill {  
            height: 100%;  
            background: #F0A500;  
            box-shadow: 0 0 12px #F0A500;  
            width: 0%;  
            transition: width 0.1s linear;  
        }  
        .ls-status {  
            font-size: 12px;  
            color: #555;  
            margin-top: 14px;  
            font-weight: 500;  
            letter-spacing: 0.04em;  
            text-align: center;  
            padding: 0 20px;  
        }  

        @keyframes glowPulse {  
            0%, 100% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); }  
            50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.4); }  
        }  
          
        @keyframes pulseDotGlow {  
            0%, 100% { transform: scale(1); opacity: 0.4; box-shadow: 0 0 0 0 rgba(224, 85, 85, 0.7); }  
            70% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 0 8px rgba(224, 85, 85, 0); }  
        }  

        /* ==========================================  
           📱 PORTAL UI MAIN LAYOUT  
           ========================================== */  
        .portal-header {  
            padding: 24px 16px 12px;  
            text-align: center;  
            background: linear-gradient(to bottom, rgba(17,18,23,0.8), transparent);  
            border-bottom: 1px solid var(--border);  
        }  

        .portal-logo-container {  
            width: 64px;  
            height: 64px;  
            margin: 0 auto 12px;  
        }  

        .portal-logo-container img {  
            width: 100%;  
            height: 100%;  
            object-fit: contain;  
        }  

        .portal-headline {  
            font-size: 24px;  
            font-weight: 700;  
            letter-spacing: -0.02em;  
            margin-bottom: 8px;  
        }  

        .portal-gold-header {  
            font-family: Arial, Helvetica, sans-serif;  
            font-size: 12pt;  
            font-weight: 700;  
            color: var(--accent);  
            line-height: 1.4;  
            letter-spacing: -0.01em;  
            display: block;  
        }  

        .portal-white-subheader {  
            font-family: Arial, Helvetica, sans-serif;  
            font-size: 12pt;  
            font-weight: 400;  
            color: var(--text);  
            line-height: 1.4;  
            letter-spacing: -0.01em;  
            display: block;  
        }  

        .landing-cards-wrapper {  
            padding: 24px 16px 40px;  
            display: flex;  
            flex-direction: column;  
            gap: 16px;  
            max-width: 600px;  
            width: 100%;  
            margin: 0 auto;  
        }  

        .show-card {  
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);  
            border: 2px solid var(--border-2);  
            border-radius: var(--radius);  
            padding: 22px 20px;  
            display: flex;  
            justify-content: space-between;  
            align-items: center;  
            text-decoration: none;  
            cursor: pointer;  
            transition: transform 0.15s ease, border-color 0.15s ease;  
        }  

        .show-card:hover { border-color: var(--accent); }  
        .show-card:active { transform: scale(0.98); }  

        .show-card-title {  
            font-size: 16px;  
            font-weight: 600;  
            color: var(--text);  
            padding-right: 12px;  
            line-height: 1.4;  
        }  

        .show-card-action {  
            font-size: 12px;  
            font-weight: 700;  
            color: var(--accent);  
            text-transform: uppercase;  
            letter-spacing: 0.05em;  
            flex-shrink: 0;  
        }  

        /* ==========================================  
           🏆 SYMMETRICAL CARD LAYOUT  
           ========================================== */  
        .leaderboard-cards-wrapper {  
            padding: 24px 16px 40px;  
            display: flex;  
            flex-direction: column;  
            gap: 12px;  
            max-width: 600px;  
            width: 100%;  
            margin: 0 auto;  
        }  

        .portal-card {  
            background: var(--surface);  
            border: 2px solid var(--border-2);  
            border-radius: var(--radius);  
            padding: 18px 16px;  
            display: flex;  
            justify-content: space-between;  
            align-items: center;  
            text-decoration: none;  
            transition: transform 0.15s ease, background-color 0.15s ease;  
        }  

        .portal-card:active {  
            transform: scale(0.98);  
            background: var(--surface-2);  
        }  

        .card-meta-left {  
            display: flex;  
            flex-direction: column;  
            gap: 4px;  
            min-width: 0;  
            flex: 1;  
            padding-right: 12px;  
        }  

        .card-main-title {  
            font-size: 15px;  
            font-weight: 600;  
            color: var(--text);  
            line-height: 1.3;  
        }  

        .card-sub-label {  
            font-size: 12px;  
            color: var(--text-3);  
            line-height: 1.3;  
        }  

        .card-metric-right {  
            display: flex;  
            flex-direction: column;  
            align-items: flex-end;  
            gap: 4px;  
            flex-shrink: 0;  
            text-align: right;  
            min-width: 135px;  
        }  

        .tier-status-wrapper {  
            display: flex;  
            align-items: center;  
            gap: 6px;  
        }  

        .turnout-status-icon {  
            width: 10px;  
            height: 10px;  
            border-radius: 50%;  
            display: inline-block;  
            flex-shrink: 0;  
        }  
        .icon-critical { background: var(--red); animation: pulseDotGlow 1.8s infinite ease-in-out; }  
        .icon-warning  { background: var(--accent); }  
        .icon-optimal  { background: var(--green); }  
        .icon-pending  { background: var(--muted); }  

        .tier-title {  
            font-size: 11px;  
            font-weight: 700;  
            text-transform: uppercase;  
            letter-spacing: 0.03em;  
        }  

        .tier-value {  
            font-size: 12px;  
            color: var(--text-3);  
            font-weight: 500;  
        }  

        .tier-value span {  
            font-size: 16px;  
            font-weight: 700;  
            color: var(--text);  
        }  

        .tier-critical .tier-title { color: var(--red); }  
        .tier-warning .tier-title { color: var(--accent); }  
        .tier-optimal .tier-title { color: var(--green); }  
        .tier-pending .tier-title { color: var(--text-3); }  
          
        @media (max-width: 480px) {  
            .portal-card { padding: 16px 14px; }  
            .card-main-title { font-size: 14px; }  
            .card-metric-right { min-width: 125px; }  
            .tier-title { font-size: 10px; }  
            .tier-value { font-size: 11px; }  
            .tier-value span { font-size: 14px; }  
        }  
    </style>  
</head>  
<body ontouchstart="">

    <div id="loadingScreen">  
        <div class="ls-logo-area"><img src="logo.png" alt="Logo"></div>  
        <div class="ls-title">Shine on Stage</div>  
        <div class="ls-hype" id="lsHype">LOADING BOX OFFICE...</div>  
        <div class="ls-pct" id="lsPct">0%</div>  
        <div class="ls-bar-bg"><div class="ls-bar-fill" id="lsBar"></div></div>  
        <div class="ls-status" id="lsStatus">Checking box office manifests...</div>  
    </div>  

    <header class="portal-header">  
        <div class="portal-logo-container"><img src="logo.png" alt="Logo"></div>  
        <h1 class="portal-headline">Ticket Booking Portal</h1>  
        <div id="dynamicHeaderContainer">  
            <div class="portal-gold-header">Select your performance</div>  
        </div>  
    </header>  

    <main class="landing-cards-wrapper" id="showSelectionContainer"></main>  

    <div id="leaderboardWrapper" style="display: none;">  
        <section class="leaderboard-cards-wrapper" id="leaderboardContainer"></section>  
    </div>  

    <script>  
        const PORTAL_CONFIG = {  
            jotformBaseUrl: "https://form.jotform.com/261435880262357",  
            googleSheetApiUrl: "https://script.google.com/macros/s/AKfycbxob7KaAWNSF4tFcKaGDwiuR1BSH8zQTT49_wia27xTnWyNPHewhiAzcrlKwT5UwJwF/exec",  
            showsDataManifest: [],  
            dancersDemographicsRoster: {}  
        };  

        let activeShowId = null;  
        let currentProgress = 0;  
        let apiFinished = false;  

        window.addEventListener("DOMContentLoaded", () => {  
            const bar = document.getElementById("lsBar");  
            const pct = document.getElementById("lsPct");  
            const hype = document.getElementById("lsHype");  
            const status = document.getElementById("lsStatus");  
              
            function updateLoader() {  
                if (apiFinished) return;  

                let increment = 0;  
                if (currentProgress < 50) {  
                    increment = Math.random() * 4 + 2;  
                } else if (currentProgress < 80) {  
                    increment = Math.random() * 1.5 + 0.5;  
                } else if (currentProgress < 98) {  
                    increment = (100 - currentProgress) * 0.05;  
                }  

                currentProgress += increment;  
                if (currentProgress > 99) currentProgress = 99.1;  

                const displayPct = Math.floor(currentProgress);  
                if (bar) bar.style.width = currentProgress.toFixed(1) + "%";  
                if (pct) pct.textContent = displayPct + "%";  

                if (hype && status) {  
                    if (displayPct < 35) {  
                        hype.textContent = "CURTAIN RISING...";  
                        status.textContent = "Securing your front row manifest...";  
                    } else if (displayPct < 70) {  
                        hype.textContent = "LIGHTS DIMMING...";  
                        status.textContent = "Syncing live theatre box office data...";  
                    } else {  
                        hype.textContent = "PLACES PLEASE...";  
                        status.textContent = "Finalizing allocation maps... ready for booking!";  
                    }  
                }  

                setTimeout(updateLoader, 60);  
            }  
              
            updateLoader();  

            fetch(PORTAL_CONFIG.googleSheetApiUrl, {  
                method: "GET",  
                headers: { "Content-Type": "text/plain;charset=utf-8" }  
            })  
            .then(response => response.json())  
            .then(liveFeedData => {  
                apiFinished = true;  
                  
                if (bar) bar.style.width = "100%";  
                if (pct) pct.textContent = "100%";  

                PORTAL_CONFIG.showsDataManifest = liveFeedData.shows || [];  
                PORTAL_CONFIG.dancersDemographicsRoster = liveFeedData.roster || {};  
                  
                populateShows();  

                const screen = document.getElementById("loadingScreen");  
                if (screen) {  
                    screen.classList.add("fade-out");  
                    setTimeout(() => { screen.classList.add("hidden"); }, 200);  
                }  
            })  
            .catch(error => {  
                console.error("Database connection failure:", error);  
                if (status) status.textContent = "Connection Error. Please reload.";  
            });  
        });  

        function populateShows() {  
            const container = document.getElementById("showSelectionContainer");  
            if (!container || !PORTAL_CONFIG.showsDataManifest.length) return;  

            container.innerHTML = PORTAL_CONFIG.showsDataManifest.map(show =>   
                `<a href="javascript:void(0);" onclick="handleShowSelection('${show.id}')" class="show-card">  
                    <div class="show-card-title">${show.name}</div>  
                    <div class="show-card-action">Book Tickets →</div>  
                </a>`  
            ).join('');  
        }  

        function handleShowSelection(showId) {  
            activeShowId = showId;  
            const showData = PORTAL_CONFIG.showsDataManifest.find(s => s.id === showId);  
            if (!showData) return;  

            document.getElementById("showSelectionContainer").style.display = "none";  
                
            document.getElementById("dynamicHeaderContainer").innerHTML = `  
                <div class="portal-gold-header">Select the school you're coming to support...</div>  
                <br>  
                <div class="portal-white-subheader">You're coming to: <b>${showData.name}</b></div>  
            `;  
                
            document.getElementById("leaderboardWrapper").style.display = "block";  
            renderCards();  
        }  

        function renderCards() {  
            const showData = PORTAL_CONFIG.showsDataManifest.find(s => s.id === activeShowId);  
            const container = document.getElementById("leaderboardContainer");  

            if (!showData || !container) return;  

            const cardsData = Object.keys(showData.schools).map(schoolName => {  
                const sold = Number(showData.schools[schoolName]) || 0;  
                  
                const cleanKey = schoolName.replace(/\s+/g, '').toLowerCase();  
                let dancers = 0;  
                  
                for (let key in PORTAL_CONFIG.dancersDemographicsRoster) {  
                    if (key.replace(/\s+/g, '').toLowerCase() === cleanKey) {  
                        dancers = Number(PORTAL_CONFIG.dancersDemographicsRoster[key]) || 0;  
                        break;  
                    }  
                }  

                let ratio = 0;  
                if (sold > 0) {  
                    if (dancers > 0) {  
                        ratio = sold / dancers;  
                    } else {  
                        ratio = sold / 15;  
                    }  
                }  

                let tierClass = "tier-pending";  
                let iconClass = "icon-pending";  
                let statusLabel = "Sales Open";  

                if (sold > 0) {  
                    if (ratio < 1.0) {  
                        tierClass = "tier-critical";  
                        iconClass = "icon-critical";  
                        statusLabel = "Just getting going";  
                    } else if (ratio < 2.5) {  
                        tierClass = "tier-warning";  
                        iconClass = "icon-warning";  
                        statusLabel = "Growing support";  
                    } else {  
                        tierClass = "tier-optimal";  
                        iconClass = "icon-optimal";  
                        statusLabel = "Brilliant response!";  
                    }  
                }  

                return {  
                    name: schoolName,  
                    sold: sold,  
                    ratio: ratio,  
                    tierClass: tierClass,  
                    iconClass: iconClass,  
                    statusText: statusLabel  
                };  
            }).sort((a, b) => a.name.localeCompare(b.name));  

            container.innerHTML = cardsData.map(item => {  
                const targetShowParam = encodeURIComponent(showData.name);  
                const targetSchoolParam = encodeURIComponent(item.name.trim());  
                const queryDestinationUrl = `${PORTAL_CONFIG.jotformBaseUrl}?show=${targetShowParam}&school=${targetSchoolParam}`;  
                 console.log(queryDestinationUrl);
                  
                const sublabelText = (item.sold === 0)   
                    ? `Be the first to secure tickets! →`  
                    : `Click to buy tickets for this school →`;  

                const accentStyle = (item.sold === 0) ? 'color: var(--accent); font-weight: 500;' : 'color: var(--text-3); font-weight: 400;';  

                // Using getAttribute('data-url') protects the parameters from HTML attribute quote corruption
                return `  
                    <a href="javascript:void(0);" onclick="window.location.href=this.getAttribute('data-url')" data-url="${queryDestinationUrl}" class="portal-card">  
                        <div class="card-meta-left">  
                            <div class="card-main-title">${item.name}</div>  
                            <div class="card-sub-label" style="${accentStyle}">${sublabelText}</div>  
                        </div>  
                        <div class="card-metric-right ${item.tierClass}">  
                            <div class="tier-status-wrapper">  
                                <span class="turnout-status-icon ${item.iconClass}"></span>  
                                <div class="tier-title">${item.statusText}</div>  
                            </div>  
                            <div class="tier-value"><span>${item.ratio.toFixed(1)}</span> Seats / Dancer</div>  
                        </div>  
                    </a>  
                `;  
            }).join('');  
        }  
    </script>  
</body>  
</html>
