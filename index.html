<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shine on Stage - Ticket Booking Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           🎨 BRANDING & THEME (Matched perfectly to Sign In app)
           ========================================== */
        :root {
            --bg: #09090C;
            --surface: #111217;
            --surface-2: #16171D;
            --border: #1E2029;
            --border-2: #262730;
            
            --accent: #F0A500;
            --accent-bg: rgba(240, 165, 0, 0.13);
            --accent-bdr: rgba(240, 165, 0, 0.35);
            
            --red: #E05555;
            --red-bg: rgba(224, 85, 85, 0.13);
            --red-bdr: rgba(224, 85, 85, 0.40);
            
            --green: #3ECF8E;
            --green-bg: rgba(62, 207, 142, 0.13);
            --green-bdr: rgba(62, 207, 142, 0.40);
            
            --text: #FFFFFF;
            --text-2: #E0E0E0;
            --text-3: #888888;
            --font: 'Poppins', sans-serif;
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ==========================================
           ⏳ LOADING SCREEN (Identical to Sign In App)
           ========================================== */
        #loadingScreen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.4s;
        }
        #loadingScreen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        #loadingScreen.hidden {
            display: none;
        }
        .ls-logo-area {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }
        .ls-logo-area::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140px;
            height: 140px;
            background: #F0A500;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            filter: blur(45px);
            animation: glowPulse 3s infinite ease-in-out;
            z-index: 0;
        }
        .ls-logo-area img {
            width: 140px;
            height: 140px;
            position: relative;
            z-index: 1;
            object-fit: contain;
        }
        .ls-title {
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 5px;
            color: #F0A500;
            text-transform: uppercase;
            margin: 8px 0 24px;
            font-family: var(--font);
        }
        .ls-hype {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #F0A500;
            text-transform: uppercase;
            font-weight: 700;
            font-family: var(--font);
            height: 1.2rem;
            margin-bottom: 10px;
            text-align: center;
        }
        .ls-pct {
            font-size: 2.8rem;
            font-weight: 900;
            color: #fff;
            font-family: var(--font);
            font-variant-numeric: tabular-nums;
            margin-bottom: 10px;
        }
        .ls-bar-bg {
            width: 220px;
            height: 3px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
        }
        .ls-bar-fill {
            height: 100%;
            background: #F0A500;
            box-shadow: 0 0 12px #F0A500;
            width: 0%;
            transition: width 0.1s linear;
        }
        .ls-status {
            font-size: 12px;
            color: #555;
            margin-top: 14px;
            font-family: var(--font);
            font-weight: 500;
            letter-spacing: 0.04em;
            text-align: center;
            padding: 0 20px;
        }
        @keyframes glowPulse {
            0% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.4); }
            100% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); }
        }

        /* ==========================================
           📱 PORTAL INTERFACE COMPONENTS
           ========================================== */
        .portal-header {
            padding: 24px 16px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(17,18,23,0.8), transparent);
            border-bottom: 1px solid var(--border);
        }

        .portal-logo-container {
            width: 64px;
            height: 64px;
            margin: 0 auto 12px;
            position: relative;
        }

        .portal-logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .portal-headline {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .portal-sub-headline {
            font-size: 14px;
            color: var(--text-3);
        }

        .show-selector-container {
            padding: 16px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        .input-select-wrapper {
            background: var(--surface);
            border: 2px solid var(--border-2);
            border-radius: var(--radius);
            padding: 4px 12px;
            display: flex;
            align-items: center;
        }

        .input-select-wrapper select {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-2);
            font-family: var(--font);
            font-size: 16px;
            font-weight: 500;
            padding: 12px 0;
            cursor: pointer;
            -webkit-appearance: none;
        }

        .leaderboard-section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            padding: 16px 16px 8px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        .leaderboard-cards-wrapper {
            padding: 0 16px 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        .portal-card {
            background: var(--surface);
            border: 2px solid var(--border-2);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            transition: transform 0.15s ease, border-color 0.15s ease;
        }

        .portal-card:active {
            transform: scale(0.98);
            background: var(--surface-2);
        }

        .card-meta-left {
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
            flex: 1;
        }

        .card-main-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-sub-label {
            font-size: 13px;
            color: var(--text-3);
        }

        .card-metric-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
            padding-left: 12px;
        }

        .tier-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tier-value {
            font-size: 13px;
            color: var(--text-2);
            font-weight: 500;
        }

        .tier-value span {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        /* Tier Theme Status Layout Variants */
        .tier-critical .tier-title { color: var(--red); }
        .tier-warning .tier-title { color: var(--accent); }
        .tier-optimal .tier-title { color: var(--green); }

        .tier-critical-card { border-color: rgba(224, 85, 85, 0.25); }
        .tier-warning-card  { border-color: rgba(240, 165, 0, 0.25); }
        .tier-optimal-card  { border-color: rgba(62, 207, 142, 0.25); }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="ls-logo-area">
            <img src="logo.png" alt="Shine on Stage">
        </div>
        <div class="ls-title">Shine on Stage</div>
        <div class="ls-hype" id="loadingHype">Initializing Box Office...</div>
        <div class="ls-pct" id="loadingPct">0%</div>
        <div class="ls-bar-bg">
            <div class="ls-bar-fill" id="loadingBarFill"></div>
        </div>
        <div class="ls-status" id="loadingStatus">Connecting to transaction server...</div>
    </div>

    <header class="portal-header">
        <div class="portal-logo-container">
            <img src="logo.png" alt="Logo">
        </div>
        <h1 class="portal-headline">Ticket Booking Portal</h1>
        <p class="portal-sub-headline">Select your production performance to check school assignments</p>
    </header>

    <main class="show-selector-container">
        <div class="input-select-wrapper">
            <select id="showSelector" onchange="handleShowSelectionChange()"></select>
        </div>
    </main>

    <section class="leaderboard-section-title">School Support Leaderboard</section>
    <section class="leaderboard-cards-wrapper" id="leaderboardContainer"></section>

    <script>
        const PORTAL_CONFIG = {
            jotformBaseUrl: "form.jotform.com/261234567890",
            showsDataManifest: [
                {
                    id: "show-001",
                    name: "Friday Night Live Showcase — 10th July 2026",
                    schools: {
                        "Stardance Academy": 8,
                        "Elite Moves": 22,
                        "Grace School of Dance": 35
                    }
                },
                {
                    id: "show-002",
                    name: "Saturday Matinee Spectacular — 11th July 2026",
                    schools: {
                        "Stardance Academy": 25,
                        "Velocity Dance": 14,
                        "Aspire Stage School": 19
                    }
                },
                {
                    id: "show-003",
                    name: "Sunday Grand Finale — 12th July 2026",
                    schools: {
                        "Elite Moves": 20,
                        "Velocity Dance": 18,
                        "Aspire Stage School": 40
                    }
                }
            ],
            dancersDemographicsRoster: {
                "Stardance Academy": 12,
                "Elite Moves": 15,
                "Grace School of Dance": 14,
                "Velocity Dance": 10,
                "Aspire Stage School": 16
            }
        };

        // Execution Hooks
        window.addEventListener("DOMContentLoaded", () => {
            populateShowDropdownOptions();
            executeAppLoadingSequence(false, () => {
                renderTargetShowLeaderboardCards();
            });
        });

        function populateShowDropdownOptions() {
            const dropdownElement = document.getElementById("showSelector");
            dropdownElement.innerHTML = PORTAL_CONFIG.showsDataManifest.map(show => 
                `<option value="${show.id}">${show.name}</option>`
            ).join('');
        }

        function handleShowSelectionChange() {
            // Trigger a faster intermediate box office reload when switching performances
            executeAppLoadingSequence(true, () => {
                renderTargetShowLeaderboardCards();
            });
        }

        /**
         * ⏳ CORE SIMULATE LOADING ENGINE
         * Mimics the precise step loop execution framework of index-14.html
         */
        function executeAppLoadingSequence(isIntermediateReload = false, completionCallback) {
            const screen = document.getElementById("loadingScreen");
            const fill = document.getElementById("loadingBarFill");
            const pctText = document.getElementById("loadingPct");
            const statusText = document.getElementById("loadingStatus");
            const hypeText = document.getElementById("loadingHype");

            // Define specific box office operational logs for the hype fields
            const boxOfficeHypeMessages = [
                "INITIALIZING BOX OFFICE...",
                "LOADING SEATING MANIFESTS...",
                "MAPPING AUDITORIUM CAPACITY...",
                "COUNTING TICKET STUBS...",
                "REFRESHING SALES LOGS...",
                "SYNCING AUDIENCE DATA...",
                "VERIFYING SCHOOL SECTIONS...",
                "BOX OFFICE DATA READY"
            ];

            const internalStatusLogs = isIntermediateReload 
                ? [
                    "Interrogating transaction tokens...",
                    "Fetching updated stadium maps...",
                    "Recalculating sales differentials...",
                    "Populating view layout variables..."
                  ]
                : [
                    "Connecting to transaction server...",
                    "Requesting secure token validation...",
                    "Retrieving master box office manifests...",
                    "Parsing global sales ledger entries...",
                    "Calculating school support ratios...",
                    "Building structural leaderboard array..."
                  ];

            // Reset components completely prior to running loop thread
            screen.classList.remove("fade-out", "hidden");
            fill.style.width = "0%";
            pctText.textContent = "0%";
            hypeText.textContent = boxOfficeHypeMessages[0];
            statusText.textContent = internalStatusLogs[0];

            let currentProgress = 0;

            function processIterationStep() {
                // Adjust cycle jump size depending on whether this is a full initial load or a fast show-switch reload
                let stepJump = isIntermediateReload 
                    ? Math.floor(Math.random() * 15) + 10  // Faster step speeds
                    : Math.floor(Math.random() * 6) + 3;    // Standard production load pace

                currentProgress = Math.min(100, currentProgress + stepJump);
                
                // Set UI parameters directly
                fill.style.width = currentProgress + "%";
                pctText.textContent = currentProgress + "%";

                // Map specific percent steps evenly across the box office string limits
                let hypeIndex = Math.floor((currentProgress / 100) * (boxOfficeHypeMessages.length - 1));
                hypeText.textContent = boxOfficeHypeMessages[hypeIndex];

                let statusIndex = Math.floor((currentProgress / 100) * (internalStatusLogs.length - 1));
                statusText.textContent = internalStatusLogs[statusIndex];

                if (currentProgress < 100) {
                    let loopDelayInterval = isIntermediateReload ? 40 : 80;
                    setTimeout(processIterationStep, loopDelayInterval);
                } else {
                    // Loop execution complete, clean up and terminate screen layers
                    screen.classList.add("fade-out");
                    setTimeout(() => {
                        screen.classList.add("hidden");
                        if (completionCallback) completionCallback();
                    }, 400);
                }
            }

            // Fire loop initiation thread
            setTimeout(processIterationStep, 100);
        }

        function renderTargetShowLeaderboardCards() {
            const selectedActiveShowId = document.getElementById("showSelector").value;
            const currentShowDataObj = PORTAL_CONFIG.showsDataManifest.find(item => item.id === selectedActiveShowId);
            const leaderboardContainer = document.getElementById("leaderboardContainer");

            if (!currentShowDataObj) return;

            const processedLeaderboardArray = Object.keys(currentShowDataObj.schools).map(schoolName => {
                const totalTicketsSoldBySchool = currentShowDataObj.schools[schoolName];
                const activeTotalDancersInSchool = PORTAL_CONFIG.dancersDemographicsRoster[schoolName] || 1;
                const supportRatio = totalTicketsSoldBySchool / activeTotalDancersInSchool;

                let dynamicCardTierClass = "";
                let dynamicCardStatusLabel = "";

                if (supportRatio < 1.2) {
                    dynamicCardTierClass = "tier-critical";
                    dynamicCardStatusLabel = "Critical Support Needed";
                } else if (supportRatio >= 1.2 && supportRatio < 2.0) {
                    dynamicCardTierClass = "tier-warning";
                    dynamicCardStatusLabel = "Growing Support";
                } else {
                    dynamicCardTierClass = "tier-optimal";
                    dynamicCardStatusLabel = "Full Cheering Section";
                }

                return {
                    name: schoolName,
                    metricRatio: supportRatio.toFixed(1),
                    tierStyle: dynamicCardTierClass,
                    statusText: dynamicCardStatusLabel
                };
            }).sort((alpha, beta) => alpha.name.localeCompare(beta.name));

            leaderboardContainer.innerHTML = processedLeaderboardArray.map(item => {
                const structuralDestinationLink = `https://${PORTAL_CONFIG.jotformBaseUrl}?show=${encodeURIComponent(selectedActiveShowId)}&school=${encodeURIComponent(item.name)}`;
                return `
                    <a href="${structuralDestinationLink}" class="portal-card ${item.tierStyle}-card">
                        <div class="card-meta-left">
                            <div class="card-main-title">${item.name}</div>
                            <div class="card-sub-label">Click to begin buying tickets →</div>
                        </div>
                        <div class="card-metric-right ${item.tierStyle}">
                            <div class="tier-title">${item.statusText}</div>
                            <div class="tier-value"><span>${item.metricRatio}</span> Seats / Dancer</div>
                        </div>
                    </a>
                `;
            }).join('');
        }
    </script>
</body>
</html>
